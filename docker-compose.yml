services:
  mongodb:
    image: mongo:7
    container_name: tax-workbench-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-taxworkbench}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-taxworkbench}
      MONGO_INITDB_DATABASE: tax_workbench
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: tax-workbench-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  mongo_data:
  redis_data:
